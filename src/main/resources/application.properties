spring.application.name=BookShop

# Fix Tomcat session error
server.servlet.session.persistent=false

# Fix DevTools restart issue (correct spelling)
spring.devtools.restart.enabled=false

# --- MySQL Database Config ---
spring.datasource.url=jdbc:mysql://localhost:3306/bookshop?useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Email Config ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

support.email=phyrommann@gmail.com